name: PHP Composer

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, curl
          coverage: xdebug
          tools: composer:v2

      - name: Validar composer.json y composer.lock
        run: composer validate --strict

      - name: Cache de dependencias de Composer
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Instalar dependencias
        run: composer install --prefer-dist --no-progress --no-interaction

      # Opcional: ejecutar pruebas si las tienes configuradas
      # - name: Ejecutar tests
      #   run: composer run-script test